<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Sổ Tay 30 Ngày – Kẹp Tóc Handmade</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,500&family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --cream: #faf7f3;
  --rose: #c8765e;
  --rose-light: #f5e6df;
  --rose-mid: #e8c4b5;
  --brown: #3a1e12;
  --muted: #9a7060;
  --sage: #8fa882;
  --sage-light: #dde8d5;
  --amber: #c49440;
  --amber-light: #f5eccf;
  --purple: #9478b8;
  --purple-light: #ede5f5;
  --blue: #5a8fa8;
  --blue-light: #ddeef5;
  --white: #ffffff;
  --border: rgba(180,130,110,0.18);
  --shadow: rgba(100,50,30,0.07);
}

body {
  background: var(--cream);
  font-family: 'Be Vietnam Pro', sans-serif;
  color: var(--brown);
  min-height: 100vh;
  padding: 0 0 60px;
  max-width: 480px;
  margin: 0 auto;
}

/* ── HEADER ── */
.header {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 28px 20px 24px;
  text-align: center;
  position: sticky; top: 0; z-index: 100;
}
.header-tag {
  font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--rose); font-weight: 500;
  display: block; margin-bottom: 6px;
}
.header-title {
  font-family: 'Playfair Display', serif;
  font-size: 22px; font-weight: 500; color: var(--brown);
  line-height: 1.2;
}
.header-title em { color: var(--rose); font-style: italic; }
.header-sub {
  font-size: 12px; color: var(--muted); margin-top: 5px; font-weight: 300;
}

/* ── LEGEND PILLS ── */
.legend {
  display: flex; gap: 8px; flex-wrap: wrap;
  padding: 14px 20px; border-bottom: 1px solid var(--border);
  background: var(--white);
}
.pill {
  font-size: 11px; font-weight: 500;
  padding: 4px 10px; border-radius: 20px;
  white-space: nowrap;
}
.pill-make  { background: var(--rose-light);   color: #8a4530; }
.pill-story { background: var(--sage-light);   color: #4a6a40; }
.pill-tips  { background: var(--amber-light);  color: #7a5c10; }
.pill-life  { background: var(--purple-light); color: #5a3a8a; }
.pill-engage{ background: var(--blue-light);   color: #2a5a78; }

/* ── WEEK HEADER ── */
.week-header {
  padding: 22px 20px 10px;
  display: flex; align-items: center; gap: 10px;
}
.week-badge {
  font-size: 11px; font-weight: 600; letter-spacing: 1px;
  text-transform: uppercase;
  background: var(--rose); color: white;
  padding: 4px 12px; border-radius: 20px;
  white-space: nowrap;
}
.week-theme {
  font-family: 'Playfair Display', serif;
  font-size: 13px; font-style: italic;
  color: var(--muted); line-height: 1.4;
}

/* ── DAY LIST ── */
.days-list { padding: 0 16px; }

.day-item {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 16px;
  margin-bottom: 10px;
  overflow: hidden;
  box-shadow: 0 2px 8px var(--shadow);
}

.day-trigger {
  display: flex; align-items: center; gap: 12px;
  padding: 15px 16px;
  cursor: pointer;
  user-select: none;
}

/* colour bar left */
.day-trigger::before {
  content: '';
  width: 3px; height: 40px;
  border-radius: 3px;
  flex-shrink: 0;
}
.type-make  .day-trigger::before { background: var(--rose); }
.type-story .day-trigger::before { background: var(--sage); }
.type-tips  .day-trigger::before { background: var(--amber); }
.type-life  .day-trigger::before { background: var(--purple); }
.type-engage .day-trigger::before { background: var(--blue); }

.day-num-badge {
  width: 34px; height: 34px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600; flex-shrink: 0;
}
.type-make   .day-num-badge { background: var(--rose-light);   color: #8a4530; }
.type-story  .day-num-badge { background: var(--sage-light);   color: #4a6a40; }
.type-tips   .day-num-badge { background: var(--amber-light);  color: #7a5c10; }
.type-life   .day-num-badge { background: var(--purple-light); color: #5a3a8a; }
.type-engage .day-num-badge { background: var(--blue-light);   color: #2a5a78; }

.day-info { flex: 1; min-width: 0; }
.day-label { font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; }
.day-title-text { font-size: 14px; font-weight: 500; color: var(--brown); line-height: 1.35; }

.chevron {
  font-size: 18px; color: var(--muted); flex-shrink: 0;
  transition: transform 0.25s ease;
  display: flex; align-items: center;
}
.day-item.open .chevron { transform: rotate(180deg); }

/* ── DAY BODY ── */
.day-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s ease;
}
.day-item.open .day-body { max-height: 800px; }

.day-body-inner {
  border-top: 1px solid var(--border);
  padding: 16px;
}

.section-title {
  font-size: 10px; font-weight: 600; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--muted);
  margin-bottom: 10px;
}

.bullet-list { list-style: none; margin-bottom: 14px; }
.bullet-list li {
  display: flex; gap: 10px;
  font-size: 14px; line-height: 1.55; color: var(--brown);
  padding: 7px 0;
  border-bottom: 1px solid var(--border);
}
.bullet-list li:last-child { border-bottom: none; }
.bullet-dot { color: var(--rose); flex-shrink: 0; font-size: 16px; margin-top: -1px; }

.hook-box {
  background: var(--rose-light);
  border-radius: 12px;
  padding: 12px 14px;
}
.hook-label {
  font-size: 10px; font-weight: 600; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--rose);
  margin-bottom: 5px;
}
.hook-text {
  font-size: 13px; color: #8a4530;
  font-style: italic; line-height: 1.6;
}

/* ── TIPS FOOTER ── */
.tips-section {
  margin: 28px 16px 0;
  background: var(--brown);
  border-radius: 20px;
  padding: 24px 20px;
  color: white;
}
.tips-section h3 {
  font-family: 'Playfair Display', serif;
  font-size: 18px; font-style: italic;
  margin-bottom: 16px; color: white;
}
.tip-card {
  background: rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 13px 14px;
  margin-bottom: 10px;
}
.tip-card:last-child { margin-bottom: 0; }
.tip-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
.tip-desc { font-size: 12px; opacity: 0.8; line-height: 1.55; }

.footer-note {
  text-align: center; padding: 28px 20px 0;
  font-size: 12px; color: var(--muted);
}
.footer-note span { color: var(--rose); }
</style>

const app = document.getElementById('app');
let dayNum = 0;

data.forEach(week => {
  const wh = document.createElement('div');
  wh.className = 'week-header';
  wh.innerHTML = `<span class="week-badge">${week.week}</span><span class="week-theme">"${week.theme}"</span>`;
  app.appendChild(wh);

  const dl = document.createElement('div');
  dl.className = 'days-list';

  week.days.forEach(day => {
    dayNum++;
    const item = document.createElement('div');
    item.className = `day-item type-${day.type}`;

    item.innerHTML = `
      <div class="day-trigger">
        <div class="day-num-badge">N${dayNum}</div>
        <div class="day-info">
          <div class="day-label">${day.label}</div>
          <div class="day-title-text">${day.title}</div>
        </div>
        <div class="chevron">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
      <div class="day-body">
        <div class="day-body-inner">
          <div class="section-title">Sườn nội dung</div>
          <ul class="bullet-list">
            ${day.bullets.map(b => `<li><span class="bullet-dot">—</span><span>${b}</span></li>`).join('')}
          </ul>
          <div class="hook-box">
            <div class="hook-label">Câu mở đầu gợi ý</div>
            <div class="hook-text">"${day.hook}"</div>
          </div>
        </div>
      </div>
    `;

    item.querySelector('.day-trigger').addEventListener('click', () => {
      const isOpen = item.classList.contains('open');
      document.querySelectorAll('.day-item.open').forEach(el => el.classList.remove('open'));
      if (!isOpen) item.classList.add('open');
    });

    dl.appendChild(item);
  });

  app.appendChild(dl);
});
